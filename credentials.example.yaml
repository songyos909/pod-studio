# คัดลอกไฟล์นี้เป็น credentials.yaml แล้วกรอกค่าจริง (credentials.yaml ถูก gitignore ไว้)
# อย่า commit ไฟล์ credentials.yaml ขึ้น git เด็ดขาด

etsy:
  keystring: "YOUR_ETSY_API_KEY"          # จาก https://www.etsy.com/developers/your-apps
  shop_id: "YOUR_SHOP_ID"                  # เลข shop id ของร้าน
  redirect_uri: "http://localhost:3456/callback"   # ต้องตรงกับ Callback URL ที่ตั้งใน app
  scopes: "listings_r listings_w shops_r"
  # token จะถูกสร้าง/เก็บอัตโนมัติใน etsy_token.json หลังรัน --auth

shopify:
  shop: "your-shop"                         # ถ้าร้านคือ your-shop.myshopify.com ใส่แค่ "your-shop"
  access_token: "shpat_xxxxxxxxxxxxxxxx"    # Admin API access token จาก custom app
  api_version: "2024-10"

# คีย์สำหรับทีม AI agents — ใส่เฉพาะ provider ที่เลือกใน config.yaml (agents.provider)
# แนะนำตั้งเป็น env var แทนก็ได้ (GEMINI_API_KEY / GROQ_API_KEY / ANTHROPIC_API_KEY / OPENAI_API_KEY)
gemini:
  api_key: ""        # ฟรี: https://aistudio.google.com/apikey
groq:
  api_key: ""        # ฟรี: https://console.groq.com/keys
anthropic:
  api_key: ""        # เสียเงิน: sk-ant-...
openai:
  api_key: ""        # เสียเงิน: sk-...
# ollama ไม่ต้องมีคีย์ (รันในเครื่อง) — แค่ลง Ollama แล้วตั้ง agents.provider: ollama

# ===== ร้านขายไฟล์ดิจิทัล (Stripe Checkout) =====
# ถ้าเว้นว่างทั้งหมด = โหมดทดสอบ (mock) จำลองการจ่ายเพื่อลองระบบส่งไฟล์
# ขอคีย์ที่ https://dashboard.stripe.com/apikeys (สลับ Test/Live ได้)
stripe:
  secret_key: ""        # sk_test_... (ทดสอบ) หรือ sk_live_... (จริง)
  publishable_key: ""   # pk_test_... / pk_live_...
  webhook_secret: ""    # whsec_... จาก `stripe listen` หรือ Dashboard > Webhooks
  # ทดสอบบน PC:  stripe listen --forward-to localhost:8500/store/webhook
  # บัตรทดสอบ:   4242 4242 4242 4242  (วันหมดอายุอนาคต, CVC อะไรก็ได้)
